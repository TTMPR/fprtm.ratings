# FPTM · Fase 3.4 — Backup semanal de las tablas críticas a Supabase Storage.
#
# Requiere UN secret en el repo (Settings → Secrets and variables → Actions):
#   SUPABASE_SERVICE_ROLE_KEY — Supabase → Settings → API → service_role
#
# El export va a un bucket PRIVADO "backups" del mismo proyecto Supabase,
# organizado por fecha (backups/YYYY-MM-DD/tabla.json|.csv).
# Deliberadamente NO se sube como artifact de Actions: este repo es público
# y los artifacts de repos públicos son descargables por cualquiera —
# los exports contienen datos personales (emails, DOB, direcciones).

name: Backup semanal Supabase

on:
  schedule:
    - cron: '0 7 * * 1'   # lunes 7:00 UTC = 3:00 AM en Puerto Rico
  workflow_dispatch: {}    # permite correrlo a mano desde la pestaña Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Exportar tablas y subir a Supabase Storage
        env:
          SUPABASE_URL: https://qrvyfdpwtearfpjruwja.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKUP_UPLOAD: '1'
        run: node backup/export_backup.mjs
