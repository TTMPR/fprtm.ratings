name: Cargar Torneo a Base de Datos

on:
  workflow_dispatch:
    inputs:
      torneo:
        description: 'Nombre del archivo CSV (sin .csv)'
        required: true
        default: 'albergue_olimpico_march2026'
      confirmar:
        description: 'Escribir "si" para confirmar la carga'
        required: true
        default: 'si'

jobs:
  upload:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirmar == 'si' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run upload script
        env:
          CSV_FILE: ${{ github.event.inputs.torneo }}.csv
        run: |
          # Override CSV_FILE in the script via env var
          python3 - <<'PYEOF'
          import os, csv, requests, sys

          SUPABASE_URL  = 'https://qrvyfdpwtearfpjruwja.supabase.co'
          SUPABASE_KEY  = 'sb_publishable_mM59efPqpcgrR3g3_6F_Ww_h1jg4PyV'
          CSV_FILE      = os.environ.get('CSV_FILE', 'albergue_olimpico_march2026.csv')
          TORNEO_NOMBRE = 'Albergue Olímpico 2026'
          TORNEO_FECHA  = '2026-03-01'

          HEADERS = {
              'apikey':        SUPABASE_KEY,
              'Authorization': f'Bearer {SUPABASE_KEY}',
              'Content-Type':  'application/json',
              'Prefer':        'return=representation',
          }

          POINT_TABLE = [
              {'maxDiff': 24,           'fav': 8,  'underdog': 8  },
              {'maxDiff': 49,           'fav': 7,  'underdog': 10 },
              {'maxDiff': 99,           'fav': 5,  'underdog': 12 },
              {'maxDiff': 149,          'fav': 3,  'underdog': 15 },
              {'maxDiff': 199,          'fav': 2,  'underdog': 20 },
              {'maxDiff': 249,          'fav': 1,  'underdog': 26 },
              {'maxDiff': float('inf'), 'fav': 0,  'underdog': 32 },
          ]

          def get_points(rA, rB, winner_is_A):
              diff = abs(rA - rB)
              row  = next(r for r in POINT_TABLE if diff <= r['maxDiff'])
              a_is_fav = rA >= rB
              if winner_is_A:
                  pts = row['fav'] if a_is_fav else row['underdog']
                  return pts, -pts
              else:
                  pts = row['underdog'] if a_is_fav else row['fav']
                  return -pts, pts

          def sb_get(table, params=''):
              r = requests.get(f'{SUPABASE_URL}/rest/v1/{table}{params}', headers=HEADERS)
              r.raise_for_status()
              return r.json()

          def sb_post(table, body):
              r = requests.post(f'{SUPABASE_URL}/rest/v1/{table}', headers=HEADERS, json=body)
              r.raise_for_status()
              return r.json()

          def sb_patch(table, query, body):
              r = requests.patch(f'{SUPABASE_URL}/rest/v1/{table}?{query}', headers=HEADERS, json=body)
              r.raise_for_status()
              return r.json()

          def parse_fprtm_id(raw_id):
              raw_id = raw_id.strip()
              if not raw_id:
                  return None
              parts = [p.strip() for p in raw_id.split(',')]
              fprtm_parts = [p for p in parts if p.startswith('fprtm|')]
              if not fprtm_parts:
                  return None
              try:
                  return int(fprtm_parts[0].split('|')[1])
              except ValueError:
                  return None

          def is_walkover(scores_str):
              if not scores_str:
                  return False
              parts = [s.strip().lstrip('-') for s in scores_str.split(',') if s.strip()]
              return bool(parts) and all(p == '0' for p in parts)

          # ── Load players ──────────────────────────────────────────────────────
          print('📥 Cargando jugadores...')
          data = sb_get('Base%20de%20Datos',
                        '?select=%22Member%20ID%22,%22First%20Name%22,%22Last%20Name%22,%22Rating%22'
                        '&order=%22Member%20ID%22.asc&limit=1000')
          players = {}
          for p in data:
              mid = p['Member ID']
              players[mid] = {
                  'id':     mid,
                  'name':   f"{p['First Name'] or ''} {p['Last Name'] or ''}".strip(),
                  'rating': p['Rating'] or 1500,
              }
          print(f'   → {len(players)} jugadores cargados.')

          # ── Read CSV ──────────────────────────────────────────────────────────
          print(f'\n📄 Leyendo {CSV_FILE}...')
          matches = []
          skipped_empty = skipped_walkover = 0
          with open(CSV_FILE, newline='', encoding='utf-8') as f:
              reader = csv.reader(f)
              for i, row in enumerate(reader):
                  if i == 0 or len(row) < 3:
                      continue
                  winner_id = parse_fprtm_id(row[1])
                  loser_id  = parse_fprtm_id(row[2])
                  scores    = row[3].strip() if len(row) > 3 else ''
                  if winner_id is None or loser_id is None:
                      skipped_empty += 1
                      continue
                  if is_walkover(scores):
                      skipped_walkover += 1
                      continue
                  matches.append({'winner_id': winner_id, 'loser_id': loser_id})
          print(f'   → {len(matches)} partidos válidos.')
          print(f'   → {skipped_empty} sin oponente, {skipped_walkover} walkovers omitidos.')

          # ── Create tournament ─────────────────────────────────────────────────
          print(f'\n🏆 Creando torneo "{TORNEO_NOMBRE}"...')
          existing = sb_get('torneos',
                            f'?nombre=eq.{requests.utils.quote(TORNEO_NOMBRE)}&select=id')
          if existing:
              print(f'   ⚠ Torneo ya existe (ID: {existing[0]["id"]}). Abortando para evitar duplicados.')
              sys.exit(1)
          result    = sb_post('torneos', {'nombre': TORNEO_NOMBRE, 'fecha': TORNEO_FECHA})
          torneo_id = result[0]['id'] if isinstance(result, list) else result['id']
          print(f'   ✅ Torneo creado con ID: {torneo_id}')

          # ── Process matches ───────────────────────────────────────────────────
          print(f'\n⚡ Calculando ratings ({len(matches)} partidos)...')
          ratings = {mid: p['rating'] for mid, p in players.items()}
          deltas  = {mid: 0          for mid in players}
          pending = []
          unknown = set()

          for m in matches:
              wid, lid = m['winner_id'], m['loser_id']
              if wid not in players:
                  unknown.add(str(wid)); continue
              if lid not in players:
                  unknown.add(str(lid)); continue
              rW, rL = ratings[wid], ratings[lid]
              wGain, lGain = get_points(rW, rL, winner_is_A=True)
              pending.append({'idA': wid, 'idB': lid,
                              'nameA': players[wid]['name'], 'nameB': players[lid]['name'],
                              'rA': rW, 'rB': rL, 'aGain': wGain, 'bGain': lGain})
              deltas[wid] += wGain
              deltas[lid] += lGain

          final_ratings = {mid: ratings[mid] + deltas[mid] for mid in ratings}
          if unknown:
              print(f'   ⚠ IDs no encontrados: {", ".join(sorted(unknown))}')
          print(f'   → {len(pending)} partidos a guardar.')

          # ── Save matches ──────────────────────────────────────────────────────
          print(f'\n💾 Guardando partidos...')
          saved = errors = 0
          for r in pending:
              try:
                  sb_post('partidos', {
                      'torneo_id': torneo_id, 'jugador_a_id': r['idA'], 'jugador_b_id': r['idB'],
                      'ganador': 'A', 'rating_a_antes': r['rA'], 'rating_b_antes': r['rB'],
                      'rating_a_despues': r['rA'] + r['aGain'], 'rating_b_despues': r['rB'] + r['bGain'],
                      'fecha': TORNEO_FECHA, 'nombre_a': r['nameA'], 'nombre_b': r['nameB'],
                  })
                  saved += 1
              except Exception as e:
                  errors += 1
                  print(f'   ❌ {r["nameA"]} vs {r["nameB"]}: {e}')
          print(f'   ✅ {saved} partidos guardados. {errors} errores.')

          # ── Update ratings ────────────────────────────────────────────────────
          participants = {r['idA'] for r in pending} | {r['idB'] for r in pending}
          print(f'\n📊 Actualizando ratings de {len(participants)} jugadores...')
          updated = 0
          for mid in participants:
              if final_ratings[mid] != players[mid]['rating']:
                  sb_patch('Base%20de%20Datos', f'%22Member%20ID%22=eq.{mid}',
                           {'Rating': final_ratings[mid]})
                  updated += 1
          print(f'   ✅ {updated} ratings actualizados.')

          # ── Save snapshot ─────────────────────────────────────────────────────
          print(f'\n📸 Guardando snapshot de participantes...')
          snapshot = {}
          for r in pending:
              for mid, name, rOrig, gain in [
                  (r['idA'], r['nameA'], r['rA'], r['aGain']),
                  (r['idB'], r['nameB'], r['rB'], r['bGain']),
              ]:
                  if mid not in snapshot:
                      snapshot[mid] = {'id_jugador': mid, 'nombre': name, 'club': '',
                                       'rating_inicio': rOrig, 'rating_fin': rOrig + gain,
                                       'ganados': 0, 'perdidos': 0, 'id_torneo': torneo_id}
                  else:
                      snapshot[mid]['rating_fin'] += gain
              snapshot[r['idA']]['ganados'] += 1
              snapshot[r['idB']]['perdidos'] += 1
          rows = list(snapshot.values())
          for i in range(0, len(rows), 50):
              sb_post('resultados_evento', rows[i:i+50])
          print(f'   ✅ {len(rows)} snapshots guardados.')

          # ── Summary ───────────────────────────────────────────────────────────
          changes = sorted([(mid, final_ratings[mid] - players[mid]['rating'])
                            for mid in participants], key=lambda x: -x[1])
          print('\n' + '='*60)
          print('  ✅ CARGA COMPLETADA')
          print('='*60)
          print(f'  Torneo ID:      {torneo_id}')
          print(f'  Partidos:       {len(pending)}')
          print(f'  Participantes:  {len(participants)}')
          print('\n  Top 5 ganancias:')
          for mid, delta in changes[:5]:
              print(f'    #{mid} {players[mid]["name"]}: +{delta} ({players[mid]["rating"]} → {final_ratings[mid]})')
          print('\n  Top 5 pérdidas:')
          for mid, delta in changes[-5:][::-1]:
              print(f'    #{mid} {players[mid]["name"]}: {delta} ({players[mid]["rating"]} → {final_ratings[mid]})')
          PYEOF
